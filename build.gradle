plugins {
    id 'java'
    id 'net.fabricmc.fabric-loom' version '1.15.+'
    id 'maven-publish'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

version = '1.0.0'
group = 'com.antibliss'

base {
    archivesName = 'IHateTheBlissPlugin'
}

repositories {
    mavenCentral()
    maven {
        name = 'Fabric'
        url = 'https://maven.fabricmc.net/'
    }
}

loom {
    splitEnvironmentSourceSets()
}

dependencies {
    minecraft "com.mojang:minecraft:26.1.2"
    compileOnly "net.fabricmc:fabric-loader:0.18.4"
    implementation "net.fabricmc.fabric-api:fabric-api:0.153.0+26.1.2"
}

tasks.withType(JavaCompile).configureEach {
    options.release = 25
}