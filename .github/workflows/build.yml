name: Build IHateTheBlissPlugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'gradle'
        
      - name: Setup Gradle 9.2
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-9.2-bin.zip -o gradle-9.2-bin.zip
          unzip -q gradle-9.2-bin.zip
          echo "GRADLE_HOME=$(pwd)/gradle-9.2" >> $GITHUB_ENV
          echo "$(pwd)/gradle-9.2/bin" >> $GITHUB_PATH
       
      - name: Build
        run: gradle assemble --refresh-dependencies --no-daemon
      
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: IHateTheBlissPlugin
          path: build/libs/*.jar
      
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
